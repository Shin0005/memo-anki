services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: memoanki
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  backend:
    build:
      context: . # ルートをコンテキストに
      dockerfile: backend/Dockerfile
    ports: ['3001:3001']
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/memoanki
    depends_on: [db]
    volumes:
      - ./backend:/app/backend # ホットリロード用
      - ./shared:/app/shared # shared も同期
      - /app/backend/node_modules # backend 固有も保護

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    command: npx next dev --webpack # turbopackは無限ループに陥ったので不使用
    ports: ['3000:3000']
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api
    depends_on: [backend]
    volumes:
      - ./frontend:/app/frontend
      - ./shared:/app/shared
      - /app/frontend/node_modules
      - /app/frontend/.next # ホスト側のキャッシュをコンテナから遮断

volumes:
  postgres_data:
