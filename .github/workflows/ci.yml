# ============================================================
# CI パイプライン
#
# 【トリガー設計の理由】
# - push: docs/ 以外の全ブランチでCIを実行し、早期にエラーを検知する
# - pull_request: main へのPR時にCIを必須化するため
# ============================================================
name: CI

concurrency: # 古いコミットのCIを自動でキャンセル（並列実行制御）
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '**' # すべてのブランチを対象
      - '!docs/**' # docs/ で始まるブランチは除外
  pull_request:
    branches:
      - main

jobs:
  # ============================================================
  # Backend CI
  # ============================================================
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Node.jsセットアップ + キャッシュ設定
      #
      # cache: 'npm' の理由
      # npm ciは毎回node_modulesを削除してフルインストールするため、
      # キャッシュなしだと1ジョブあたり1〜2分余分にかかる。
      # setup-node の cache オプションはpackage-lock.jsonのハッシュを
      # キーにするため、lock fileが変わらない限りキャッシュが有効になる。
      # ------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      # ------------------------------------------------------------
      # 依存関係をインストール
      #
      # npm ci を使う理由
      # npm install はpackage.jsonの範囲内で依存を更新する可能性があり、
      # CI実行ごとに異なるバージョンがインストールされる恐れがある。
      # ------------------------------------------------------------
      - name: Install dependencies
        run: npm ci
        working-directory: backend

      # ------------------------------------------------------------
      # Prisma初期化
      #
      # Prismaの型は node_modules/.prisma/client/ に自動生成される
      # ファイルの中にある。このフォルダはgitignoreされているため、
      # CIの npm install だけでは型情報が読み込まれない。
      # ------------------------------------------------------------
      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'

      # ------------------------------------------------------------
      # Prettierフォーマットチェック
      #
      # --check を使う理由：
      # --write はファイルを書き換えてしまい、CIが成功しても
      # 「自動修正された」という事実が隠蔽される。
      # --check はフォーマット違反があれば終了コード1で失敗する
      # ------------------------------------------------------------
      - name: Format check
        run: npx prettier --check "src/**/*.ts" "test/**/*.ts"
        working-directory: backend

      # ------------------------------------------------------------
      # ESLintチェック
      # ------------------------------------------------------------
      - name: Lint
        run: npm run lint
        working-directory: backend

      # ------------------------------------------------------------
      # ビルド確認
      #
      # TypeScriptのコンパイルエラーをCIで検出する。
      # lintだけでは型エラーは検出できない
      # NestJSのnest buildはtscをラップしているため型チェックも行われる。
      # ------------------------------------------------------------
      - name: Build
        run: npm run build
        working-directory: backend

      # ------------------------------------------------------------
      # ユニットテスト
      #
      # 【現状】環境設定時点ではテストファイルが少ない可能性があるため
      # --passWithNoTests を付けてテストが0件でも失敗しないようにしている。
      # テストが増えるにつれてこのオプションを外す。
      # ------------------------------------------------------------
      - name: Test
        run: npm test -- --passWithNoTests
        working-directory: backend

  # ============================================================
  # Frontend CI
  # ============================================================
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # backendと同じ理由でキャッシュを設定
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      # ------------------------------------------------------------
      # Prettierフォーマットチェック
      # ------------------------------------------------------------
      - name: Format check
        run: npx prettier --check "app/**/*.{ts,tsx}"
        working-directory: frontend

      # ------------------------------------------------------------
      # ESLint（Next.js標準）
      # ------------------------------------------------------------
      - name: Lint
        run: npm run lint
        working-directory: frontend

      # ------------------------------------------------------------
      # Next.jsビルド確認
      #
      # Next.js 15はビルド時にTypeScript型チェック・ページの
      # 静的解析も行うため、lintだけでは拾えないエラーを検出できる。
      # ただし、環境変数（API URLなど）が未設定だとビルドが失敗する場合があるため、
      # 環境変数が必要になったら GitHub Secrets + env: を追加する。
      # ------------------------------------------------------------
      - name: Build
        run: npm run build
        working-directory: frontend
