# ============================================================
# CI パイプライン (Frontend)
#
# 【トリガー設計の理由】
# - push: docs/ 以外の全ブランチでCIを実行し、早期にエラーを検知する
# - pull_request: main へのPR時にCIを必須化するため
# ============================================================
name: Frontend CI

concurrency: # 古いコミットのCIを自動でキャンセル（並列実行制御）
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '**' # すべてのブランチを対象
      - '!docs/**' # docs/ で始まるブランチは除外
    paths:
      - 'frontend/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'docker-compose.yml'

jobs:
  # ============================================================
  # Frontend CI
  # ============================================================
  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # backendと同じ理由でキャッシュを設定
      # npm workspacesのためlockファイルはルート1箇所。
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # npm workspacesのためルートで一度npm ciすれば全workspaceがインストールされる。
      - name: Install dependencies
        run: npm ci

      # ------------------------------------------------------------
      # Prisma初期化
      #
      # generate:openapi スクリプトが AppModule 経由で Prisma 型を参照するため、
      # OpenAPI生成より前に実行する必要がある。
      # ------------------------------------------------------------
      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'

      # ------------------------------------------------------------
      # OpenAPI仕様の生成
      #
      # GENERATE_OPENAPI=true により PrismaService.$connect() をスキップし、
      # DBなしで NestJS をブートストラップして openapi.json を生成する。
      # 出力先は shared/openapi.json。
      # ------------------------------------------------------------
      - name: Generate OpenAPI spec
        run: npm run generate:openapi --workspace=backend
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'
          JWT_SECRET: 'dummy'

      # ------------------------------------------------------------
      # sharedの型生成
      #
      # openapi-typescript が shared/openapi.json から shared/src/api.ts を生成する。
      # この後の shared ビルドおよび frontend ビルドで必要になる。
      # ------------------------------------------------------------
      - name: Generate shared types
        run: npm run generate --workspace=@memo-anki/shared

      # ------------------------------------------------------------
      # sharedパッケージのビルド
      #
      # frontendの依存先として宣言されているため、dist/ が存在しないと
      # 型解決・ビルドが失敗する可能性がある。
      # ------------------------------------------------------------
      - name: Build shared package
        run: npm run build --workspace=@memo-anki/shared

      # ------------------------------------------------------------
      # Prettierフォーマットチェック
      # ------------------------------------------------------------
      - name: Format check
        run: npx prettier --check "{app,features,lib}/**/*.{ts,tsx}"
        working-directory: frontend

      # ------------------------------------------------------------
      # ESLint（Next.js標準）
      # ------------------------------------------------------------
      - name: Lint
        run: npm run lint --workspace=frontend

      # ------------------------------------------------------------
      # Next.jsビルド確認
      #
      # Next.js 15はビルド時にTypeScript型チェック・ページの
      # 静的解析も行うため、lintだけでは拾えないエラーを検出できる。
      # ただし、環境変数（API URLなど）が未設定だとビルドが失敗する場合があるため、
      # 環境変数が必要になったら GitHub Secrets + env: を追加する。
      # ------------------------------------------------------------
      - name: Build
        run: npm run build --workspace=frontend
