# ============================================================
# CI パイプライン (Backend)
#
# 【トリガー設計の理由】
# - push: docs/ 以外の全ブランチでCIを実行し、早期にエラーを検知する
# - pull_request: main へのPR時にCIを必須化するため
# ============================================================
name: Backend CI

concurrency: # 古いコミットのCIを自動でキャンセル（並列実行制御）
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - '**' # すべてのブランチを対象
      - '!docs/**' # docs/ で始まるブランチは除外
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'docker-compose.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - 'docker-compose.yml'

jobs:
  # ============================================================
  # Backend CI
  # ============================================================
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Node.jsセットアップ + キャッシュ設定
      #
      # cache: 'npm' の理由
      # npm ciは毎回node_modulesを削除してフルインストールするため、
      # キャッシュなしだと1ジョブあたり1〜2分余分にかかる。
      # setup-node の cache オプションはpackage-lock.jsonのハッシュを
      # キーにするため、lock fileが変わらない限りキャッシュが有効になる。
      # ------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: package-lock.json

      # ------------------------------------------------------------
      # 依存関係をインストール
      #
      # npm ci を使う理由
      # npm install はpackage.jsonの範囲内で依存を更新する可能性があり、
      # CI実行ごとに異なるバージョンがインストールされる恐れがある。
      # npm workspacesのため、ルートで一度実行すれば全workspaceがインストールされる。
      # ------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # ------------------------------------------------------------
      # Prisma初期化
      #
      # Prismaの型は node_modules/.prisma/client/ に自動生成される
      # ファイルの中にある。このフォルダはgitignoreされているため、
      # CIの npm install だけでは型情報が読み込まれない。
      # generate:openapi スクリプトも AppModule 経由で Prisma 型を参照するため、
      # OpenAPI生成より前に実行する必要がある。
      # ------------------------------------------------------------
      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: backend
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'

      # ------------------------------------------------------------
      # OpenAPI仕様の生成
      #
      # GENERATE_OPENAPI=true により PrismaService.$connect() をスキップし、
      # DBなしで NestJS をブートストラップして openapi.json を生成する。
      # 出力先は shared/openapi.json。
      # ------------------------------------------------------------
      - name: Generate OpenAPI spec
        run: npm run generate:openapi --workspace=backend
        env:
          DATABASE_URL: 'postgresql://dummy:dummy@localhost:5432/dummy'
          JWT_SECRET: 'dummy'

      # ------------------------------------------------------------
      # sharedの型生成
      #
      # openapi-typescript が shared/openapi.json から shared/src/api.ts を生成する。
      # この後の shared ビルドおよび backend ビルドで必要になる。
      # ------------------------------------------------------------
      - name: Generate shared types
        run: npm run generate --workspace=@memo-anki/shared

      # ------------------------------------------------------------
      # sharedパッケージのビルド
      #
      # backendは @memo-anki/shared を dependencies で参照しており、
      # dist/ が存在しないと型解決・ビルドが失敗する。
      # ------------------------------------------------------------
      - name: Build shared package
        run: npm run build --workspace=@memo-anki/shared

      # ------------------------------------------------------------
      # Prettierフォーマットチェック
      #
      # --check を使う理由：
      # --write はファイルを書き換えてしまい、CIが成功しても
      # 「自動修正された」という事実が隠蔽される。
      # --check はフォーマット違反があれば終了コード1で失敗する
      # ------------------------------------------------------------
      - name: Format check
        run: npx prettier --check "src/**/*.ts" "test/**/*.ts"
        working-directory: backend

      # ------------------------------------------------------------
      # ESLintチェック
      # ------------------------------------------------------------
      - name: Lint
        run: npm run lint --workspace=backend

      # ------------------------------------------------------------
      # ビルド確認
      #
      # TypeScriptのコンパイルエラーをCIで検出する。
      # lintだけでは型エラーは検出できない
      # NestJSのnest buildはtscをラップしているため型チェックも行われる。
      # ------------------------------------------------------------
      - name: Build
        run: npm run build --workspace=backend

      # ------------------------------------------------------------
      # ユニットテスト
      #
      # 【現状】環境設定時点ではテストファイルが少ない可能性があるため
      # --passWithNoTests を付けてテストが0件でも失敗しないようにしている。
      # テストが増えるにつれてこのオプションを外す。 -> 外した。
      # ------------------------------------------------------------
      - name: Test
        run: npm test --workspace=backend
